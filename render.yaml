# Render Blueprint: staging + prod web services for liner-notes-server.
#
# Postgres is hosted on Neon (free tier: persistent and scales to zero), so there
# is no `databases:` block here. Each service's DATABASE_URL is set in the Render
# dashboard (sync: false) to its Neon connection string — no secrets are committed.
# Verify current plan names/regions in the Render docs before applying.

services:
  # Staging tracks the `staging` branch — the target for release/TestFlight builds.
  - type: web
    name: liner-notes-api-staging
    runtime: docker
    dockerfilePath: ./Dockerfile
    branch: staging
    region: oregon
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL # Neon (staging) connection string — set in the dashboard
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false

  # Production tracks `master`. Free for now; upgrade the plan at launch.
  - type: web
    name: liner-notes-api-prod
    runtime: docker
    dockerfilePath: ./Dockerfile
    branch: master
    region: oregon
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL # Neon (prod) connection string — set in the dashboard
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
